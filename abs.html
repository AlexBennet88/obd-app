<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renault ABS Диагностика</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #22222e;
      --accent: #eab308; --accent2: #fef08a; /* Желтый гоночный акцент под цвет ABS/Renault */
      --green: #4ade80; --red: #f87171; --blue: #3b82f6;
      --text: #f0f0f4; --muted: #6b7280;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 20px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 28px;
      max-width: 400px; width: 100%;
      box-shadow: 0 0 40px rgba(234,179,8,0.05);
    }
    .header { text-align: center; margin-bottom: 24px; }
    .icon { font-size: 48px; margin-bottom: 12px; display: block; }
    h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .chat-tag {
      display: inline-block; font-size: 11px; padding: 4px 10px;
      border-radius: 8px; margin-top: 10px;
      background: rgba(234,179,8,0.1); color: var(--accent2);
      border: 1px solid rgba(234,179,8,0.2);
    }
    .btn {
      display: block; width: 100%; padding: 14px; border: none;
      border-radius: 12px; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s ease; margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ca8a04, var(--accent));
      color: #000; box-shadow: 0 4px 20px rgba(234,179,8,0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-send {
      background: transparent; border: 1px solid var(--green);
      color: var(--green);
    }
    .btn-send:hover { background: rgba(74,222,128,0.08); }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

    .status { margin: 14px 0; font-size: 13px; padding: 10px 14px; border-radius: 10px; display: none; }
    .status.visible { display: block; }
    .status.sending { background: rgba(59,130,246,0.12); color: var(--blue); }
    .status.sent    { background: rgba(74,222,128,0.12); color: var(--green); }
    .status.error   { background: rgba(248,113,113,0.12); color: var(--red); }
    .status.info    { background: rgba(250,204,21,0.10); color: var(--accent); }

    .divider { height: 1px; background: var(--border); margin: 18px 0; }
    .log { font-size: 11px; color: var(--muted); line-height: 1.8; font-family: 'Courier New', monospace; max-height: 160px; overflow-y: auto; }
    .log span { color: var(--accent2); }
    .log .err { color: var(--red); }
    .log .ok { color: var(--green); }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="icon">🛑</span>
    <h1>Диагностика ABS</h1>
    <p class="subtitle">Поиск дилерских ошибок тормозной системы Renault Scenic 2</p>
    <div class="chat-tag" id="chatTag">chat_id: —</div>
  </div>

  <button class="btn btn-primary" id="connectBtn" onclick="connectABS()">🔌 Опросить блок ABS</button>
  <button class="btn btn-send" id="sendBtn" onclick="sendToTelegram()" disabled>📤 Отправить отчет в Telegram</button>

  <div class="status" id="status"></div>
  <div class="divider"></div>
  <div class="log" id="log">Вставьте карту и включите сервисное зажигание (передача, зажим Старт 5 сек)...</div>
</div>

<script>
  const N8N_WEBHOOK_URL = 'https://unlisted-corner-proclaim.ngrok-free.dev/webhook/obd-receiver';

  const urlParams = new URLSearchParams(window.location.search);
  const chatId = urlParams.get('chat_id') || '';
  document.getElementById('chatTag').textContent = 'chat_id: ' + (chatId || '⚠️ не передан');

  const OBD_PROFILES = [
    { name: 'Type A (fff0)', service: '0000fff0-0000-1000-8000-00805f9b34fb', notify: '0000fff1-0000-1000-8000-00805f9b34fb', write: '0000fff2-0000-1000-8000-00805f9b34fb' },
    { name: 'Type B (18f0)', service: '000018f0-0000-1000-8000-00805f9b34fb', notify: '00002af0-0000-1000-8000-00805f9b34fb', write: '00002af1-0000-1000-8000-00805f9b34fb' },
    { name: 'Type C (Vgate)', service: 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', notify: 'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f', write: 'bef8d6c9-9c21-4c9e-b632-bd58c1009f9f' }
  ];

  let rawResult = '';
  let writeChar = null;
  let notifyChar = null;
  let responseBuffer = '';
  let pendingResolve = null;

  function log(msg, type = '') {
    const el = document.getElementById('log');
    const time = new Date().toLocaleTimeString('ru');
    el.innerHTML += `<br><span>[${time}]</span> <span class="${type}">${msg}</span>`;
    el.scrollTop = el.scrollHeight;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = `status visible ${type}`;
  }

  function sendCommand(cmd, customTimeout = 2000) {
    return new Promise((resolve) => {
      responseBuffer = '';
      pendingResolve = resolve;
      const data = new TextEncoder().encode(cmd + '\r');
      writeChar.writeValue(data);
      
      setTimeout(() => { 
        if (pendingResolve) { 
          pendingResolve(responseBuffer); 
          pendingResolve = null; 
        } 
      }, customTimeout);
    });
  }

  async function tryProfile(device, profile) {
    log(`Пробую профиль: ${profile.name}`);
    try {
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(profile.service);
      writeChar = await service.getCharacteristic(profile.write);
      notifyChar = await service.getCharacteristic(profile.notify);

      await notifyChar.startNotifications();
      notifyChar.addEventListener('characteristicvaluechanged', (e) => {
        const text = new TextDecoder().decode(e.target.value);
        responseBuffer += text;
        
        // Защита от преждевременного завершения: проверяем, что ">" стоит в самом конце строки
        if (responseBuffer.trim().endsWith('>') && pendingResolve) {
          pendingResolve(responseBuffer);
          pendingResolve = null;
        }
      });

      log('Связь установлена. Базовая настройка ELM...', 'ok');
      await sendCommand('AT Z');    // Сброс ELM
      await sendCommand('AT E0');   // Отключаем эхо
      await sendCommand('AT H1');   // Включаем заголовки ответов
      return true;
    } catch (e) {
      log(`Профиль мимо: ${e.message}`, 'err');
      try { device.gatt.disconnect(); } catch (_) {}
      return false;
    }
  }

  async function connectABS() {
    const btn = document.getElementById('connectBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Поиск адаптера...';
    log('Запуск Web Bluetooth...');

    try {
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: OBD_PROFILES.map(p => p.service)
      });
      log(`Подключено к: <span class="ok">${device.name || 'Bluetooth ELM'}</span>`);
      showStatus('🔄 Инициализация протоколов...', 'info');

      let connected = false;
      for (const profile of OBD_PROFILES) {
        connected = await tryProfile(device, profile);
        if (connected) break;
      }

      if (!connected) {
        showStatus('❌ Не удалось настроить каналы связи BLE', 'error');
        btn.textContent = '🔌 Опросить блок ABS';
        btn.disabled = false;
        return;
      }

      showStatus('📡 Открытие диагностической сессии ABS...', 'sending');
      let absResponse = '';

      // --- ШАГ 1: Попытка опроса через CAN-шину (UDS) ---
      log('Попытка 1: Настройка под CAN-шину (AT SP 6)...');
      await sendCommand('AT SP 6');  
      await sendCommand('AT SH 740'); // Установка CAN заголовка ABS Renault
      await sendCommand('AT CRA 760'); // Явно принимаем ответы только от ABS

      log('Отправка запроса ошибок по CAN через UDS (19 02 0D)...');
      let checkCAN = await sendCommand('19 02 0D');
      log(`Ответ по CAN: <span class="ok">${checkCAN.replace(/\r/g, ' ')}</span>`);

      if (checkCAN.includes('59 02') || checkCAN.includes('7F 19')) {
        absResponse = checkCAN;
        log('Блок успешно ответил по CAN-шине!', 'ok');
      } 
      // --- ШАГ 2: Если CAN молчит, переключаемся на K-Line (Fast Init) ---
      else if (checkCAN.includes('NO DATA') || checkCAN.includes('?') || checkCAN.includes('ERROR') || checkCAN.trim() === '>') {
        log('⚠️ CAN молчит. Включаем альтернативный протокол K-Line...', 'info');
        
        await sendCommand('AT Z'); 
        await sendCommand('AT E0');
        await sendCommand('AT H1');
        await sendCommand('AT AR'); // Сброс кастомных заголовков
        
        // Переключаемся на Протокол 4 (KWP2000 Fast Init), он значительно стабильнее на клонах
        log('Настройка протокола K-Line Fast Init (AT SP 4)...');
        await sendCommand('AT SP 4', 3000); 
        
        // Тонкая настройка шины под блоки Bosch/Teves
        await sendCommand('AT AT 0');   // Отключаем адаптивный таймаут
        await sendCommand('AT ST FF');   // Выставляем максимальное время ожидания ответа
        await sendCommand('AT IB 10');   // Фиксируем скорость K-Line (10400 бод)

        // Проверяем основной адрес ABS Renault (7B)
        log('Пробуем адрес ABS [7B]. Установка хедера (AT WM 81 7B F1)...');
        await sendCommand('AT WM 81 7B F1'); 
        
        log('Инициализация K-Line сессии...');
        let initKLine = await sendCommand('81', 4000); 
        log(`Ответ на инициализацию [7B]: ${initKLine.replace(/\r/g, ' ')}`);

        log('Запрос ошибок по K-Line (18 02 FF)...');
        let checkKLine = await sendCommand('18 02 FF', 3000);
        log(`Ответ по K-Line [7B]: <span class="ok">${checkKLine.replace(/\r/g, ' ')}</span>`);
        
        // Если адрес 7B выдал пустоту, сразу пробуем альтернативный адрес (F0)
        if (checkKLine.includes('NO DATA') || checkKLine.includes('?') || checkKLine.trim() === '>') {
          log('⚠️ Адрес 7B не ответил. Переключаемся на альтернативный адрес ABS [F0]...', 'info');
          
          await sendCommand('AT Z');
          await sendCommand('AT E0');
          await sendCommand('AT H1');
          await sendCommand('AT SP 4');
          
          // Устанавливаем альтернативный хедер
          await sendCommand('AT WM 81 F0 F1');
          
          log('Инициализация K-Line сессии по адресу [F0]...');
          let initKLineF0 = await sendCommand('81', 4000);
          log(`Ответ на инициализацию [F0]: ${initKLineF0.replace(/\r/g, ' ')}`);
          
          log('Запрос ошибок по K-Line (18 02 FF)...');
          checkKLine = await sendCommand('18 02 FF', 3000);
          log(`Ответ по K-Line [F0]: <span class="ok">${checkKLine.replace(/\r/g, ' ')}</span>`);
        }

        if (checkKLine.includes('58 02') || checkKLine.includes('7F 18') || (!checkKLine.includes('NO DATA') && checkKLine.length > 5)) {
          absResponse = checkKLine;
          log('Блок ABS успешно отозвался по K-Line!', 'ok');
        }
      }

      rawResult = absResponse || checkCAN;

      // Возвращаем настройки ELM в авто-режим
      await sendCommand('AT AR');

      if (rawResult.includes('NO DATA') || rawResult.trim() === '>') {
        showStatus('❌ Блок ABS не ответил ни по CAN, ни по K-Line', 'error');
      } else if (rawResult.includes('7F 19') || rawResult.includes('7F 18')) {
        showStatus('⚠️ Запрос отклонен (7F). Проверьте условия зажигания', 'error');
      } else {
        showStatus('✅ Данные ABS успешно считаны!', 'sent');
      }
      
      document.getElementById('sendBtn').disabled = false;

    } catch (err) {
      log(`Ошибка: ${err.message}`, 'err');
      showStatus('❌ ' + err.message, 'error');
    }

    btn.textContent = '🔌 Повторить опрос ABS';
    btn.disabled = false;
  }

  async function sendToTelegram() {
    if (!chatId) {
      showStatus('❌ Ошибка: запуск выполнен без chat_id', 'error');
      return;
    }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    showStatus('📤 Передача на n8n бэкенд...', 'sending');
    try {
      const res = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          raw: rawResult,
          chat_id: chatId,
          timestamp: new Date().toISOString()
        })
      });
      if (res.ok) {
        showStatus('🚀 Отчет отправлен в Telegram!', 'sent');
        log('Бэкенд успешно принял пакет.', 'ok');
      } else throw new Error(`HTTP Status ${res.status}`);
    } catch (err) {
      showStatus('❌ ' + err.message, 'error');
      log(`Ошибка HTTP: ${err.message}`, 'err');
    }
    btn.disabled = false;
  }
</script>
</body>
</html>
